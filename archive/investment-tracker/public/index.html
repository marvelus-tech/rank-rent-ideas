<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">Investment Tracker</h1>
                <span class="tagline">Track ideas. Execute strategy.</span>
            </div>
            <div class="header-right">
                <button id="presentation-toggle" class="btn-presentation" title="Presentation Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Present
                </button>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="stocks">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                    <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
                Stocks
            </button>
            <button class="tab-btn" data-tab="crypto">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="6" x2="12" y2="12"></line>
                    <line x1="12" y1="12" x2="16" y2="10"></line>
                </svg>
                Crypto
            </button>
            <button class="tab-btn" data-tab="niches">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                </svg>
                Niches
            </button>
            <button class="tab-btn" data-tab="models">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                Models
            </button>
            <button class="tab-btn" data-tab="insights">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Insights
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Grid View -->
            <div id="grid-view" class="grid-view">
                <div class="toolbar">
                    <div class="filter-bar">
                        <input type="text" id="search-input" placeholder="Search..." class="search-input">
                        <select id="status-filter" class="status-filter">
                            <option value="all">All Status</option>
                            <option value="researching">Researching</option>
                            <option value="tracking">Tracking</option>
                            <option value="invested">Invested</option>
                            <option value="exited">Exited</option>
                        </select>
                    </div>
                    <button id="add-item-btn" class="btn-add">+ Add Item</button>
                </div>
                <div id="items-grid" class="items-grid"></div>
            </div>

            <!-- Detail View -->
            <div id="detail-view" class="detail-view hidden">
                <div class="detail-header">
                    <button id="back-btn" class="btn-back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        Back
                    </button>
                    <div class="detail-actions">
                        <button id="edit-btn" class="btn-edit">Edit</button>
                        <button id="delete-btn" class="btn-delete">Delete</button>
                    </div>
                </div>
                <div id="detail-content" class="detail-content"></div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Item</h2>
                <button id="modal-close" class="btn-close">&times;</button>
            </div>
            <form id="item-form" class="modal-form">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label for="item-name">Name</label>
                    <input type="text" id="item-name" required>
                </div>
                <div class="form-group">
                    <label for="item-ticker">Ticker/Symbol (optional)</label>
                    <input type="text" id="item-ticker">
                </div>
                <div class="form-group">
                    <label for="item-status">Status</label>
                    <select id="item-status">
                        <option value="researching">Researching</option>
                        <option value="tracking">Tracking</option>
                        <option value="invested">Invested</option>
                        <option value="exited">Exited</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="item-price">Price/Value (optional)</label>
                    <input type="text" id="item-price">
                </div>
                <div class="form-group">
                    <label for="item-tags">Tags (comma separated)</label>
                    <input type="text" id="item-tags" placeholder="solana, defi, ai">
                </div>
                <div class="form-group">
                    <label for="item-notes">Quick Notes</label>
                    <textarea id="item-notes" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="item-obsidian">Obsidian Note Path</label>
                    <input type="text" id="item-obsidian" placeholder="Investments/Stocks/TSLA.md">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Save</button>
                    <button type="button" id="modal-cancel" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
