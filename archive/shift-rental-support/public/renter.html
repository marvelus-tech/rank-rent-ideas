<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFT — Renter hub</title>
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0d0d0d;
      --bg-tertiary: #141414;
      --accent-amber: #ff9f0a;
      --accent-primary-hover: #ffb340;
      --accent-cyan: #64d2ff;
      --success: #30d158;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.08);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      --fab-size: 56px;
      --fab-inset: 40px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(var(--fab-size) + var(--fab-inset) + 16px);
    }
    .ambient {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 70% 45% at 20% 0%, rgba(100, 210, 255, 0.06), transparent 50%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(255, 159, 10, 0.05), transparent 45%),
        var(--bg-primary);
    }
    header.bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
    }
    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
    }
    .btn-ghost {
      height: 40px;
      padding: 0 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s var(--ease), color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.22);
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }
    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 22px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    @media (min-width: 1024px) {
      .dashboard {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) minmax(280px, 360px);
        gap: 24px;
        align-items: start;
      }
      .demo-banner {
        grid-column: 1 / -1;
      }
    }
    .demo-banner {
      border-radius: 14px;
      border: 1px solid rgba(255, 159, 10, 0.35);
      background: rgba(255, 159, 10, 0.1);
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text-secondary);
    }
    .demo-banner strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .demo-banner .demo-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .demo-banner button.text-btn {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-cyan);
      cursor: pointer;
      text-decoration: underline;
    }
    .panel {
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--bg-secondary);
      overflow: hidden;
    }
    /* —— Identity —— */
    .id-cover {
      height: 88px;
      position: relative;
    }
    .id-body { padding: 0 20px 20px; position: relative; }
    .id-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-top: -36px;
      border: 3px solid var(--bg-secondary);
      background: linear-gradient(145deg, rgba(255, 159, 10, 0.95), rgba(255, 140, 60, 0.75));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.02em;
    }
    .id-name {
      margin: 12px 0 4px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .id-email {
      font-size: 13px;
      color: var(--text-tertiary);
      margin: 0 0 16px;
      word-break: break-all;
    }
    .tier-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent-cyan);
      margin-bottom: 8px;
    }
    .tier-bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .tier-bar > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-amber), var(--accent-cyan));
      border-radius: 2px;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
      padding: 12px 0;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 16px;
    }
    .stats-row strong {
      display: block;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .stats-row span {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .verify-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .verify-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .verify-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }
    /* —— Hero —— */
    .hero-inner { padding: 20px; }
    .hero-vehicle {
      position: relative;
      border-radius: 16px;
      min-height: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      margin-bottom: 20px;
    }
    .hero-vehicle::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.85) 100%);
      pointer-events: none;
    }
    .hero-vehicle-copy { position: relative; z-index: 1; }
    .hero-vehicle h2 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .hero-vehicle p {
      margin: 0;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .countdown {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin: 16px 0 8px;
    }
    .countdown--urgent { color: var(--accent-amber); }
    .countdown-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn-primary {
      height: 48px;
      padding: 0 22px;
      border-radius: 24px;
      border: none;
      background: var(--accent-amber);
      color: #000;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s var(--ease), transform 0.1s var(--ease);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-primary-hover); }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-secondary {
      height: 48px;
      padding: 0 22px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.07);
    }
    .trip-steps {
      display: flex;
      gap: 4px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--glass-border);
    }
    .trip-step {
      flex: 1;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      position: relative;
      padding-top: 14px;
    }
    .trip-step::before {
      content: "";
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }
    .trip-step.done::before,
    .trip-step.current::before {
      background: var(--accent-amber);
    }
    .trip-step.current { color: var(--accent-amber); }
    .trip-step.done { color: var(--text-secondary); }
    .docs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }
    .doc-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent-cyan);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .doc-link:hover { text-decoration: underline; }
    .empty-hero {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
    }
    .empty-hero a {
      color: var(--accent-cyan);
      font-weight: 500;
    }
    /* —— History —— */
    .hist-head {
      padding: 18px 20px 0;
    }
    .hist-head h3 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s var(--ease), background 0.2s var(--ease), border-color 0.2s var(--ease);
    }
    .tab:hover { color: var(--text-primary); }
    .tab.is-on {
      color: var(--text-primary);
      border-color: rgba(255, 159, 10, 0.35);
      background: rgba(255, 159, 10, 0.08);
    }
    .hist-search {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .hist-search::placeholder { color: var(--text-tertiary); }
    .hist-list {
      max-height: min(520px, 55vh);
      overflow-y: auto;
      padding: 0 12px 16px;
      -webkit-overflow-scrolling: touch;
    }
    @media (min-width: 1024px) {
      .hist-list { max-height: calc(100vh - 280px); }
    }
    .hist-card {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 8px;
      border-radius: 14px;
      border: 1px solid transparent;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .hist-card:hover {
      border-color: var(--glass-border);
      background: rgba(255, 255, 255, 0.02);
    }
    .hist-thumb {
      width: 80px;
      height: 56px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255, 159, 10, 0.2), rgba(100, 210, 255, 0.12));
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }
    .hist-meta h4 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .hist-meta p {
      margin: 0;
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.35;
    }
    .hist-side {
      text-align: right;
    }
    .hist-status {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .hist-cost {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .hist-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .link-sm {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-cyan);
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }
    .link-sm:hover { text-decoration: underline; }
    .empty-hist {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 1.5;
    }
    .state-loading, .state-error {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
    }
    .state-error { color: #ff8a80; }
    /* FAB */
    .fab-support {
      position: fixed;
      right: max(20px, env(safe-area-inset-right, 0px));
      bottom: max(20px, env(safe-area-inset-bottom, 0px));
      width: var(--fab-size);
      height: var(--fab-size);
      border-radius: 50%;
      background: var(--accent-amber);
      border: none;
      box-shadow: 0 8px 32px rgba(255, 159, 10, 0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
    }
    .fab-support:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(255, 159, 10, 0.45);
    }
    .fab-support svg { width: 26px; height: 26px; color: #fff; }
    :focus-visible {
      outline: 2px solid var(--accent-amber);
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      .fab-support { transition: none; }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <header class="bar">
    <a class="logo" href="index.html">SHIFT</a>
    <button type="button" class="btn-ghost" id="renter-sign-out">Sign out</button>
  </header>

  <div id="app-loading" class="state-loading">Loading your hub…</div>
  <div id="app-error" class="state-error" hidden></div>

  <div id="app-main" class="dashboard" hidden>
    <div id="demo-banner" class="demo-banner" hidden role="status"></div>
    <section class="col-profile panel" id="panel-identity" aria-labelledby="id-name"></section>
    <section class="col-hero panel" id="panel-hero" aria-label="Active trip"></section>
    <section class="col-history panel" id="panel-history" aria-label="Trip history"></section>
  </div>

  <button type="button" class="fab-support" id="fab-support" aria-label="Open support chat" title="Support">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
    </svg>
  </button>

  <script>
(function () {
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function getEmail() {
    try {
      return (sessionStorage.getItem('shift_renter_email') || '').trim().toLowerCase();
    } catch (e) { return ''; }
  }

  /** Avoid silent JSON.parse errors when HTML (SPA fallback, Live Preview, stale node) is returned. */
  function fetchJson(url) {
    return fetch(url).then(function (r) {
      return r.text().then(function (text) {
        var trim = text.trim();
        if (trim.charAt(0) === '<') {
          throw new Error(
            'API returned HTML, not JSON. Usually: (1) this page is not being served by node server.js, ' +
            '(2) port ' + (location.port || '80') + ' has an old process without /api/v1/renter routes. ' +
            'Fix: cd ~/.openclaw/workspace/shift-rental-support && node server.js — then open http://localhost:3000/renter.html'
          );
        }
        var j;
        try {
          j = JSON.parse(text);
        } catch (e2) {
          throw new Error('Invalid JSON from ' + url + ': ' + text.slice(0, 100));
        }
        if (!r.ok) throw new Error(j.message || j.error || j.hint || r.statusText);
        return j;
      });
    });
  }

  function hashSeed(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function coverGradient(seed) {
    var h = hashSeed(seed) % 360;
    var h2 = (h + 48) % 360;
    return 'linear-gradient(135deg, hsl(' + h + ', 62%, 28%) 0%, hsl(' + h2 + ', 45%, 16%) 100%)';
  }

  function assumedDeadline(status, pickupDate, dropoffDate) {
    if (status === 'Active') return new Date(dropoffDate + 'T18:00:00');
    if (status === 'Confirmed') return new Date(pickupDate + 'T09:00:00');
    return new Date(pickupDate + 'T09:00:00');
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { text: 'Now', urgent: false };
    var sec = Math.floor(ms / 1000);
    var d = Math.floor(sec / 86400);
    var h = Math.floor((sec % 86400) / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var urgent = ms < 3600000;
    var text = d > 0 ? d + 'd ' + h + 'h' : (h > 0 ? h + 'h ' + m + 'm' : m + 'm');
    return { text: text, urgent: urgent };
  }

  function mapsUrl(query) {
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
  }

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderIdentity(data) {
    var id = data.identity;
    var tierPct = Math.round((id.tier.progress || 0) * 100);
    var stats = id.stats;
    return (
      '<div class="id-cover" style="background:' + coverGradient(id.cover_gradient_seed) + '" aria-hidden="true"></div>' +
      '<div class="id-body">' +
        '<div class="id-avatar" aria-hidden="true">' + esc(id.initials) + '</div>' +
        '<h1 class="id-name" id="id-name">' + esc(id.name) + '</h1>' +
        '<p class="id-email">' + esc(id.email) + '</p>' +
        '<div class="tier-pill">' + esc(id.tier.label) + '</div>' +
        '<div class="tier-bar" title="Progress to ' + esc(id.tier.next_tier_label) + '"><i style="width:' + tierPct + '%"></i></div>' +
        '<div class="stats-row">' +
          '<div><strong>' + stats.trips_completed + '</strong><span>Done</span></div>' +
          '<div><strong>' + stats.total_trips + '</strong><span>Total</span></div>' +
          '<div><strong>—</strong><span>Miles</span></div>' +
        '</div>' +
        '<ul class="verify-list">' +
          '<li>Email verified</li>' +
          '<li>Phone verified</li>' +
          '<li>Driver license</li>' +
          '<li>Insurance on file</li>' +
        '</ul>' +
      '</div>'
    );
  }

  function renderSteps(progress) {
    var steps = progress.steps;
    var cur = progress.current_index;
    var html = '';
    for (var i = 0; i < steps.length; i++) {
      var cls = 'trip-step';
      if (i < cur) cls += ' done';
      if (i === cur) cls += ' current';
      html += '<div class="' + cls + '">' + esc(steps[i].label) + '</div>';
    }
    return html;
  }

  function renderHero(booking, countdownElId) {
    if (!booking) {
      return (
        '<div class="empty-hero">' +
          '<p>No active or upcoming trip on file.<br>Browse the fleet or open support for help.</p>' +
          '<p style="margin-top:16px"><a href="index.html">Fleet site</a></p>' +
        '</div>'
      );
    }
    var v = booking.vehicle;
    var maps = mapsUrl(booking.pickup_location);
    var unlockTitle = 'Available in a future build (geofence + time window)';
    return (
      '<div class="hero-inner">' +
        '<div class="hero-vehicle" style="background:' + coverGradient(booking.booking_id + v.make) + '">' +
          '<div class="hero-vehicle-copy">' +
            '<h2>' + esc(v.make + ' ' + v.model) + '</h2>' +
            '<p>' + esc(booking.booking_id) + ' · ' + esc(booking.status) + '</p>' +
          '</div>' +
        '</div>' +
        '<div class="countdown" id="' + countdownElId + '">—</div>' +
        '<p class="countdown-label" id="' + countdownElId + '-label">' +
          (booking.status === 'Active' ? 'Time until scheduled return' : 'Time until pickup') +
        '</p>' +
        '<div class="actions-row">' +
          '<button type="button" class="btn-primary" disabled title="' + esc(unlockTitle) + '">Unlock vehicle</button>' +
          '<a class="btn-secondary" href="' + maps + '" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;text-decoration:none">Navigate</a>' +
          '<button type="button" class="btn-secondary" id="btn-contact-trip">Contact / support</button>' +
        '</div>' +
        '<div class="trip-steps" role="list">' + renderSteps(booking.progress) + '</div>' +
        '<div class="docs-row">' +
          '<span class="doc-link">Contract (soon)</span>' +
          '<span class="doc-link">Insurance card (soon)</span>' +
          '<span class="doc-link">Inspection (soon)</span>' +
        '</div>' +
      '</div>'
    );
  }

  var profileData = null;
  var countdownTimer = null;

  function startCountdown(booking, elId) {
    var el = document.getElementById(elId);
    if (!el || !booking) return;
    function tick() {
      var target = assumedDeadline(booking.status, booking.pickup_date, booking.dropoff_date);
      var ms = target - Date.now();
      var fmt = formatCountdown(ms);
      el.textContent = fmt.text;
      el.classList.toggle('countdown--urgent', fmt.urgent);
    }
    tick();
    if (countdownTimer) clearInterval(countdownTimer);
    var iv = reduceMotion ? 60000 : 1000;
    countdownTimer = setInterval(tick, iv);
  }

  function renderHistoryList(items, filter) {
    if (!items.length) {
      return '<div class="empty-hist">No trips in this view. Try another tab or clear search.</div>';
    }
    return items.map(function (b) {
      var cost = typeof b.total_cost === 'number' ? '$' + b.total_cost.toFixed(0) : '—';
      return (
        '<article class="hist-card" data-search="' + esc(
          (b.make + ' ' + b.model + ' ' + b.pickup_location + ' ' + b.booking_id + ' ' + b.pickup_date).toLowerCase()
        ) + '">' +
          '<div class="hist-thumb" aria-hidden="true">IMG</div>' +
          '<div class="hist-meta">' +
            '<h4>' + esc(b.make + ' ' + b.model) + '</h4>' +
            '<p>' + esc(b.pickup_date) + ' → ' + esc(b.dropoff_date) + '<br>' + esc(b.pickup_location) + '</p>' +
          '</div>' +
          '<div class="hist-side">' +
            '<div class="hist-status">' + esc(b.status) + '</div>' +
            '<div class="hist-cost">' + esc(cost) + '</div>' +
            '<div class="hist-actions">' +
              '<button type="button" class="link-sm hist-receipt" data-id="' + esc(b.booking_id) + '">Receipt</button>' +
              '<a class="link-sm" href="index.html#cta">Book again</a>' +
            '</div>' +
          '</div>' +
        '</article>'
      );
    }).join('');
  }

  function wireHistory(items) {
    document.querySelectorAll('.hist-receipt').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-id');
        window.open('/api/v1/bookings/' + encodeURIComponent(id) + '/receipt', '_blank', 'noopener');
      });
    });
  }

  function filterHistoryDom() {
    var q = (document.getElementById('hist-search').value || '').trim().toLowerCase();
    document.querySelectorAll('.hist-card').forEach(function (card) {
      var hay = card.getAttribute('data-search') || '';
      card.style.display = !q || hay.indexOf(q) !== -1 ? '' : 'none';
    });
  }

  var currentFilter = 'all';

  function loadBookings() {
    var email = getEmail();
    var q = email ? '?email=' + encodeURIComponent(email) + '&status=' + encodeURIComponent(currentFilter) : '?status=' + encodeURIComponent(currentFilter);
    return fetchJson('/api/v1/renter/bookings' + q);
  }

  function mountHistory() {
    var host = document.getElementById('panel-history');
    host.innerHTML =
      '<div class="hist-head">' +
        '<h3>History</h3>' +
        '<div class="tabs" role="tablist">' +
          ['all', 'completed', 'cancelled', 'disputed'].map(function (t) {
            return '<button type="button" class="tab' + (t === currentFilter ? ' is-on' : '') + '" data-filter="' + t + '">' +
              (t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1)) + '</button>';
          }).join('') +
        '</div>' +
        '<input type="search" class="hist-search" id="hist-search" placeholder="Search model, place, date…" autocomplete="off">' +
      '</div>' +
      '<div class="hist-list" id="hist-list"></div>';

    host.querySelectorAll('.tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        currentFilter = tab.getAttribute('data-filter');
        host.querySelectorAll('.tab').forEach(function (x) { x.classList.toggle('is-on', x === tab); });
        loadBookings().then(function (d) {
          var list = document.getElementById('hist-list');
          list.innerHTML = renderHistoryList(d.items || [], currentFilter);
          wireHistory(d.items || []);
          filterHistoryDom();
        }).catch(function (err) {
          var list = document.getElementById('hist-list');
          if (list) list.innerHTML = '<div class="empty-hist">' + esc(err.message || String(err)) + '</div>';
        });
      });
    });

    loadBookings().then(function (d) {
      document.getElementById('hist-list').innerHTML = renderHistoryList(d.items || [], currentFilter);
      wireHistory(d.items || []);
    }).catch(function (err) {
      document.getElementById('hist-list').innerHTML = '<div class="empty-hist">' + esc(err.message || String(err)) + '</div>';
    });

    document.getElementById('hist-search').addEventListener('input', filterHistoryDom);
  }

  document.getElementById('renter-sign-out').addEventListener('click', function () {
    try {
      sessionStorage.removeItem('shift_renter_demo');
      sessionStorage.removeItem('shift_renter_email');
    } catch (e) { /* ignore */ }
    window.location.href = 'renter-login.html';
  });

  var email = getEmail();
  var profileUrl = '/api/v1/renter/profile' + (email ? '?email=' + encodeURIComponent(email) : '');

  fetchJson(profileUrl)
    .then(function (data) {
      profileData = data;
      document.getElementById('app-loading').hidden = true;
      document.getElementById('app-main').hidden = false;

      var ban = document.getElementById('demo-banner');
      if (data.meta && data.meta.demo_fallback && data.meta.requested_email) {
        ban.hidden = false;
        ban.innerHTML =
          '<span>Demo mode: there are no bookings for <strong>' +
          esc(data.meta.requested_email) +
          '</strong> in this database. Showing the hub for <strong>' +
          esc(data.meta.resolved_email) +
          '</strong> so you can keep building the product.</span>' +
          '<div class="demo-actions">' +
          '<button type="button" class="text-btn" id="demo-dismiss">Dismiss</button>' +
          '<button type="button" class="text-btn" id="demo-clear-email">Forget typed email &amp; reload</button>' +
          '</div>';
        document.getElementById('demo-dismiss').addEventListener('click', function () {
          ban.hidden = true;
        });
        document.getElementById('demo-clear-email').addEventListener('click', function () {
          try { sessionStorage.removeItem('shift_renter_email'); } catch (e) { /* ignore */ }
          location.reload();
        });
      } else {
        ban.hidden = true;
        ban.textContent = '';
      }

      document.getElementById('panel-identity').innerHTML = renderIdentity(data);
      document.getElementById('panel-hero').innerHTML = renderHero(data.active_booking, 'trip-countdown');
      if (data.active_booking) {
        startCountdown(data.active_booking, 'trip-countdown');
        document.getElementById('btn-contact-trip').addEventListener('click', function () {
          var id = data.active_booking.booking_id;
          window.location.href = 'support.html?booking=' + encodeURIComponent(id);
        });
      }

      mountHistory();

      document.getElementById('fab-support').addEventListener('click', function () {
        var id = data.active_booking && data.active_booking.booking_id;
        window.location.href = 'support.html' + (id ? '?booking=' + encodeURIComponent(id) : '');
      });
    })
    .catch(function (err) {
      document.getElementById('app-loading').hidden = true;
      var er = document.getElementById('app-error');
      er.hidden = false;
      er.textContent = err.message || String(err);
    });
})();
  </script>
</body>
</html>
