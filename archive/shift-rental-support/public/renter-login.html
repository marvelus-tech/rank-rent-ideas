<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFT — Renter sign-in</title>
  <style>
    :root {
      --bg-primary: #000000;
      --bg-tertiary: #141414;
      --accent-amber: #ff9f0a;
      --accent-primary-hover: #ffb340;
      --accent-cyan: #64d2ff;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-dark: rgba(13, 13, 13, 0.72);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }
    .ambient {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 159, 10, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(100, 210, 255, 0.08), transparent 50%),
        var(--bg-primary);
    }
    .shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    .top {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
      transition: opacity 0.2s var(--ease);
    }
    .logo:hover { opacity: 0.75; }
    .back {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s var(--ease);
    }
    .back:hover { color: var(--accent-cyan); }
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 36px;
      border-radius: 20px;
      background: var(--glass-dark);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 24px 80px rgba(0, 0, 0, 0.55);
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-cyan);
      margin: 0 0 12px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin: 0 0 8px;
    }
    .sub {
      font-size: 15px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0 0 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .field { margin-bottom: 20px; }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    input::placeholder { color: var(--text-tertiary); }
    input:focus {
      border-color: rgba(255, 159, 10, 0.45);
      box-shadow: 0 0 0 3px rgba(255, 159, 10, 0.15);
    }
    .btn {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      border: none;
      border-radius: 25px;
      background: var(--accent-amber);
      color: #000;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s var(--ease), transform 0.1s var(--ease);
    }
    .btn:hover { background: var(--accent-primary-hover); }
    .btn:active { transform: scale(0.99); }
    .demo-note {
      margin-top: 24px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text-tertiary);
      text-align: center;
    }
    :focus-visible {
      outline: 2px solid var(--accent-amber);
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="shell">
    <header class="top">
      <a class="logo" href="index.html">SHIFT</a>
      <a class="back" href="index.html">Fleet site</a>
    </header>
    <div class="stage">
      <div class="card">
        <p class="eyebrow">Renter</p>
        <h1 id="signin-title">Sign in</h1>
        <p class="sub">Access reservations, trip details, and roadside help in one place.</p>
        <form id="renter-login-form" novalidate>
          <div class="field">
            <label for="renter-email">Email</label>
            <input id="renter-email" name="email" type="email" autocomplete="username" placeholder="you@email.com">
          </div>
          <div class="field">
            <label for="renter-password">Password</label>
            <input id="renter-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••">
          </div>
          <button type="submit" class="btn">Continue</button>
        </form>
        <p class="demo-note">Demo: password not checked. Any email works; if it has no bookings here, the hub still loads with sample data.</p>
      </div>
    </div>
  </div>
  <script>
    (function () {
      document.getElementById('renter-login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var raw = (document.getElementById('renter-email').value || '').trim().toLowerCase();
        // Stub auth: optional email picks a renter; empty → API auto-picks any email from DB (seeds vary).
        try {
          sessionStorage.setItem('shift_renter_demo', '1');
          if (raw) sessionStorage.setItem('shift_renter_email', raw);
          else sessionStorage.removeItem('shift_renter_email');
        } catch (err) { /* ignore quota / private mode */ }
        window.location.href = 'renter.html';
      });
    })();
  </script>
</body>
</html>
